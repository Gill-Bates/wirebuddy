# WireBuddy Node — Docker Compose
#
# IMPORTANT: Enable IP forwarding on the host FIRST:
#   sudo sysctl -w net.ipv4.ip_forward=1 net.ipv6.conf.all.forwarding=1
#
# Workflow:
#   1. Create node in master UI → copy enrollment token
#   2. Set WIREBUDDY_ENROLLMENT_TOKEN in .env file
#   3. docker compose up -d
#
# Node runs WireGuard only — no web UI, no database, no DNS.

services:
  wirebuddy-node:
    image: giiibates/wirebuddy:latest
    container_name: wirebuddy-node
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      SERVER_MODE: node
      WIREBUDDY_ENROLLMENT_TOKEN: "${WIREBUDDY_ENROLLMENT_TOKEN}"
      LOG_LEVEL: INFO
      TZ: ${TZ:-Etc/UTC}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data:/app/data  # Stores node certificate and state
