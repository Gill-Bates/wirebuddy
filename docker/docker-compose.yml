services:
  wirebuddy:
    image: giiibates/wirebuddy:latest
    container_name: wirebuddy
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      LOG_LEVEL: INFO # DEBUG
      TZ: Etc/UTC
      WIREBUDDY_SECRET_KEY: "l+QGUq6BH9dLZkAQpG2jivXZeLLwYNMCmzUsfcD2wPM="
      WIREBUDDY_SKIP_NETWORK_CHECK: "1"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "5", "http://127.0.0.1:${WIREBUDDY_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
