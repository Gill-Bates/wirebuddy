{% macro nav_item(path, icon, label, external=false) %}
{% if external %}
<a class="nav-link" href="{{ path }}" target="_blank" rel="noopener noreferrer">
    <span class="material-icons">{{ icon }}</span>{{ label }}
    <span class="material-icons icon-external">open_in_new</span>
</a>
{% else %}
<a class="nav-link {% if request.url.path.startswith(path) %}active{% endif %}" href="{{ path }}">
    <span class="material-icons">{{ icon }}</span>{{ label }}
</a>
{% endif %}
{% endmacro %}
