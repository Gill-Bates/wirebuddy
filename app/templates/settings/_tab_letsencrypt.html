    <div class="tab-pane fade" id="letsencrypt-pane" role="tabpanel" aria-labelledby="letsencrypt-tab">

        <!-- SSL/TLS Certificates Card -->
        <div class="row g-3 logs-grid">
            <div class="col-lg-6">
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h3 class="h5 mb-0">SSL/TLS Certificates</h3>
                        <div>
                            <button class="btn btn-sm btn-primary d-inline-flex align-items-center justify-content-center letsencrypt-request-btn"
                                {% if user['is_admin'] %}data-bs-toggle="modal" data-bs-target="#certModal"{% endif %}>
                                <span class="material-icons align-middle me-1" style="font-size: 18px;">add_circle</span>Request Certificate
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <small class="text-muted d-block">
                            <span class="material-icons" style="font-size: 16px; vertical-align: middle;">info</span>
                            Certificates are stored in <code>/data/certs/</code>
                        </small>
                        <hr class="my-3">
                        <div id="certificates-list">
                            <p class="text-muted mb-0">Loading certificates...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
