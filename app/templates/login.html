<!DOCTYPE html>
<html lang="en" data-bs-theme="light" class="login-page">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Login – WireBuddy</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/wirebuddy_1c.svg">
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/wb-ui-system.css" rel="stylesheet">
    <link href="/static/css/login.css" rel="stylesheet">
    <link href="/static/vendor/material-icons.css" rel="stylesheet">
    <script src="/static/js/theme.js"></script>
</head>

<body data-csrf-token="{{ csrf_token }}">
    <div class="card login-card">
        <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
                <div class="logo-icon mb-2 d-flex justify-content-center">
                    <img src="/static/img/wirebuddy_1c.svg" alt="WireBuddy" class="logo-main logo-themed">
                </div>
                <p class="login-tagline small mb-2">Use WireGuard with ease!</p>
            </div>

            <div class="alert alert-danger d-none" id="error-alert" role="alert" aria-live="assertive" aria-atomic="true"></div>

            <form id="login-form" aria-describedby="error-alert">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username"
                        autocomplete="username" autocapitalize="off" autocorrect="off" required autofocus
                        aria-describedby="error-alert">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password"
                        autocomplete="current-password" required
                        aria-describedby="error-alert">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100" id="submit-btn">
                    Sign In
                </button>
            </form>

            <!-- Passkey Login Section -->
            <div id="passkey-section" class="hidden">
                <div class="d-flex align-items-center my-3">
                    <hr class="flex-grow-1">
                    <span class="px-3 text-muted small">or</span>
                    <hr class="flex-grow-1">
                </div>
                <button type="button" class="btn btn-outline-secondary btn-lg w-100" id="passkey-login-btn">
                    <span class="material-icons align-middle me-2 icon-sm">fingerprint</span>
                    Sign in with Passkey
                </button>
            </div>

            <div id="mfa-form" class="hidden">
                <div class="text-center mb-3" id="mfa-header">
                    <span class="material-icons icon-lg text-primary">security</span>
                    <h5 class="mt-2 mb-1">Two-Factor Authentication</h5>
                    <p class="text-muted small mb-0">Enter the 6-digit code from your authenticator app</p>
                </div>

                <div class="otp-digits-container mb-3" id="otp-digits">
                    <input type="text" class="form-control otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="0">
                    <input type="text" class="form-control otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="1">
                    <input type="text" class="form-control otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="2">
                    <span class="otp-separator">–</span>
                    <input type="text" class="form-control otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="3">
                    <input type="text" class="form-control otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="4">
                    <input type="text" class="form-control otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="5">
                </div>

                <button type="button" class="btn btn-primary btn-lg w-100" id="mfa-submit-btn" disabled>
                    Verify
                </button>

                <div class="text-center mt-3">
                    <button type="button" class="btn btn-link btn-sm text-muted" id="use-recovery-btn">
                        Use recovery code instead
                    </button>
                </div>

                <div id="recovery-form" class="hidden mt-3">
                    <div class="mb-3">
                        <label for="recovery-code" class="form-label">Recovery Code</label>
                        <input type="text" class="form-control form-control-lg" id="recovery-code" 
                            placeholder="Enter recovery code" autocomplete="off"
                            aria-label="Enter your recovery code">
                    </div>
                    <button type="button" class="btn btn-warning btn-lg w-100" id="recovery-submit-btn">
                        Verify Recovery Code
                    </button>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="button" class="btn btn-sm btn-outline-secondary theme-toggle-btn"
                    id="theme-toggle-btn" aria-label="Toggle theme">
                    <span class="material-icons theme-icon" id="theme-icon-login">dark_mode</span>
                </button>
            </div>

            <div class="text-center mt-3">
                <a href="https://github.com/Gill-Bates/wirebuddy" target="_blank" rel="noopener noreferrer" class="text-decoration-none wb-footer-link">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" class="wb-footer-link-icon" aria-hidden="true">
                        <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                    </svg>
                    GitHub
                    <span class="visually-hidden">(opens in new tab)</span>
                </a>
            </div>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="/static/js/passkeys.js" defer></script>
    <script src="/static/js/mfa.js" defer></script>
    <script src="/static/js/login.js" defer></script>
</body>

</html>
