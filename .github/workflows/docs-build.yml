name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/workflows/docs-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/workflows/docs-build.yml'
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment
concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-based plugins

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'docs/requirements-docs.txt'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Copy root files to docs
        run: |
          cp CHANGELOG.md docs/changelog.md
          cp LICENSE docs/license.md

      - name: Build documentation
        run: |
          mkdocs build -f docs/mkdocs.yml --strict

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch'
      )
    needs:
      - build
      - link-check
      - security-scan
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  link-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Copy root files to docs
        run: |
          cp CHANGELOG.md docs/changelog.md
          cp LICENSE docs/license.md

      - name: Build documentation
        run: mkdocs build -f docs/mkdocs.yml --strict

      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --exclude 'fonts\.gstatic\.com'
            --exclude 'gill-bates\.github\.io/wirebuddy'
            './site/**/*.html'
          fail: true

  security-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy scan docs dependencies
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'docs/requirements-docs.txt'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          timeout: '5m'
